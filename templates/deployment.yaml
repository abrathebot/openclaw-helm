apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw.fullname" . }}
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "openclaw.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "openclaw.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: openclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            # Isolation: all state goes to /data (PVC), never touches host
            - name: HOME
              value: "/data"
            - name: OPENCLAW_CONFIG
              value: "/data/.openclaw/openclaw.json"
            - name: CONFIG_DIR
              value: "/data/.openclaw"
            - name: WORKSPACE_DIR
              value: "/data/.openclaw/workspace"
            # Path-based routing — each release gets its own URL prefix
            - name: RELEASE_NAME
              value: {{ .Release.Name | quote }}
            - name: BASE_PATH
              value: {{ printf "/%s" .Release.Name | quote }}
            # Used for controlUi.allowedOrigins in generated openclaw.json
            - name: INGRESS_HOST
              value: {{ .Values.ingress.host | quote }}
            - name: GATEWAY_PORT
              value: "18789"
          ports:
            - name: wizard
              containerPort: 3000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: wizard
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: wizard
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "openclaw.fullname" . }}-data
          {{- else }}
          emptyDir: {}
          {{- end }}
