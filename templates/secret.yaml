{{- if .Values.preConfig.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw.fullname" . }}-secrets
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
type: Opaque
data:
  {{- if .Values.preConfig.anthropicApiKey }}
  anthropic-api-key: {{ .Values.preConfig.anthropicApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.preConfig.telegramBotToken }}
  telegram-bot-token: {{ .Values.preConfig.telegramBotToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.preConfig.geminiApiKey }}
  gemini-api-key: {{ .Values.preConfig.geminiApiKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.preConfig.gatewayToken }}
  gateway-token: {{ .Values.preConfig.gatewayToken | b64enc | quote }}
  {{- end }}
{{- end }}
