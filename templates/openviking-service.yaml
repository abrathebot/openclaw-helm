{{- if .Values.openviking.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw.fullname" . }}-openviking
  labels:
    {{- include "openclaw.labels" . | nindent 4 }}
    app.kubernetes.io/component: openviking
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.openviking.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "openclaw.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: openviking
{{- end }}
