image:
  repository: ghcr.io/abrathebot/openclaw
  tag: latest
  pullPolicy: IfNotPresent

service:
  port: 3000          # wizard port — only port exposed to ingress
  type: ClusterIP

ingress:
  enabled: true
  className: nginx
  host: ai.openclaw.id   # shared hostname; path = /{.Release.Name}
  annotations: {}
  tls: []

persistence:
  enabled: true
  size: 2Gi
  storageClass: ""
  accessMode: ReadWriteOnce

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 1Gi
    cpu: 500m

nodeSelector: {}
tolerations: []
affinity: {}
